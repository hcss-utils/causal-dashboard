name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: npm ci
      - run: npm run build

      # Authoritative: deploy to hcss-utils/causal-dashboard gh-pages.
      # Note: vite base is /russian_redlines-causal-dashboard/ because the
      # live Pages URL has historically been on the differently-named repo
      # at sdspieg/russian_redlines-causal-dashboard. Keeps bookmarks intact.
      - name: Deploy to hcss-utils/causal-dashboard gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist

      - name: Deploy to sdspieg/russian_redlines-causal-dashboard (legacy URL mirror)
        if: ${{ env.SDSPIEG_PAGES_PAT != '' }}
        env:
          SDSPIEG_PAGES_PAT: ${{ secrets.SDSPIEG_PAGES_PAT }}
        uses: peaceiris/actions-gh-pages@v3
        with:
          personal_token: ${{ secrets.SDSPIEG_PAGES_PAT }}
          external_repository: sdspieg/russian_redlines-causal-dashboard
          publish_branch: gh-pages
          publish_dir: ./dist
